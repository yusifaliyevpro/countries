name: PR Checks

# Cheap, API-free checks (build + type check). Safe to run on every commit and
# for every contributor — they don't touch the REST Countries API.
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  checks:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Type Check
        run: pnpm tsc --noEmit
